name: CI/CD Pipeline (.NET Framework)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
 
  test:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1
        with:
          nuget-version: 'latest'

      - name: Restore NuGet packages
        run: nuget restore TimeSeriesWPF/TimeSeriesWPF.sln

      - name: Build Solution
        run: msbuild TimeSeriesWPF/TimeSeriesWPF.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild

      - name: Run Unit Tests
        run: |
          # Поиск vstest.console.exe
          $vstestPath = Get-ChildItem -Path "C:\Program Files" -Recurse -Filter "vstest.console.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($vstestPath) {
            Write-Host "Found vstest.console.exe at: $($vstestPath.FullName)"
            & $vstestPath.FullName TimeSeriesWPF.Tests\bin\Release\TimeSeriesWPF.Tests.dll /logger:trx /TestResultsDirectory:TestResults
          } else {
            Write-Host "vstest.console.exe not found, trying dotnet test"
            dotnet test TimeSeriesWPF.Tests/TimeSeriesWPF.Tests.csproj --logger:trx --results-directory:TestResults --no-build
          }

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/


  integration:
    runs-on: windows-latest
    needs: test 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore TimeSeriesWPF/TimeSeriesWPF.sln

      - name: Build Solution
        run: msbuild TimeSeriesWPF/TimeSeriesWPF.sln /p:Configuration=Release /p:Platform="Any CPU"

      - name: Run Integration Tests
        run: |
          # Поиск и запуск интеграционных тестов
          $vstestPath = Get-ChildItem -Path "C:\Program Files" -Recurse -Filter "vstest.console.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          if ($vstestPath) {
            Write-Host "Running integration tests..."
            & $vstestPath.FullName TimeSeriesWPF.Tests\bin\Release\TimeSeriesWPF.Tests.dll /logger:trx /TestResultsDirectory:IntegrationTestResults /TestCaseFilter:"Category=Integration"
          } else {
            Write-Host "vstest.console.exe not found, skipping integration tests"
          }
        continue-on-error: true 

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: IntegrationTestResults/


    runs-on: windows-latest
    needs: [test, integration]
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: TestResults/

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Unit Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false

      - name: Upload Coverage Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: coverage-report
          path: coverage/