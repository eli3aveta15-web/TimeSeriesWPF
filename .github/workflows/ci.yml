name: CI/CD Pipeline - TimeSeriesWPF

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:

  test:
    runs-on: windows-latest
    
    steps:
     
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  

  
      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

    
      - name: Setup NuGet
        uses: nuget/setup-nuget@v1
        with:
          nuget-version: 'latest'

      - name: Restore NuGet packages
        run: nuget restore TimeSeriesWPF/TimeSeriesWPF.sln

      - name: Build Solution
        run: |
          msbuild TimeSeriesWPF/TimeSeriesWPF.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU" `
            /t:Rebuild `
            /verbosity:minimal


      - name: Run Unit Tests
        run: |
          # Поиск vstest.console.exe в установленных версиях Visual Studio
          $vstestPath = Get-ChildItem -Path "C:\Program Files" -Recurse -Filter "vstest.console.exe" -ErrorAction SilentlyContinue | Select-Object -First 1
          
          if ($vstestPath) {
            Write-Host "Found vstest.console.exe at: $($vstestPath.FullName)"
            
            # Запускаем ТОЛЬКО тесты PasswordPolicyTests (без UI-зависимостей)
            & $vstestPath.FullName `
              TimeSeriesWPF.Tests\bin\Release\TimeSeriesWPF.Tests.dll `
              /logger:trx `
              /ResultsDirectory:TestResults `
              /TestCaseFilter:"FullyQualifiedName~PasswordPolicyTests"
          } else {
            Write-Host "ERROR: vstest.console.exe not found!"
            exit 1
          }

  
      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/
          retention-days: 7

  integration:
    runs-on: windows-latest
    needs: test 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore TimeSeriesWPF/TimeSeriesWPF.sln

      - name: Build Solution
        run: |
          msbuild TimeSeriesWPF/TimeSeriesWPF.sln `
            /p:Configuration=Release `
            /p:Platform="Any CPU"


      - name: Run Integration Tests
        run: |
          Write-Host "NOTE: UI integration tests skipped in CI/CD"
          Write-Host "Reason: GitHub Actions runner has no display (headless environment)"
          Write-Host "UI tests require graphical interface and should run separately"
          Write-Host "Integration tests completed successfully (no tests to run)"
        continue-on-error: true 

      - name: Upload Integration Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: integration-test-results
          path: IntegrationTestResults/
          retention-days: 7


  report:
    runs-on: windows-latest
    needs: [test, integration] 
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

     
      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: TestResults/

   
      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()  
        with:
          name: Unit Test Results - PasswordPolicy
          path: TestResults/*.trx
          reporter: dotnet-trx
          fail-on-error: false 

    
    