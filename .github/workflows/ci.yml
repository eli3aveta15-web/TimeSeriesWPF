name: CI/CD Pipeline (.NET Framework)

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    runs-on: windows-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1
        with:
          nuget-version: 'latest'

      - name: Restore NuGet packages
        run: nuget restore TimeSeriesWPF/TimeSeriesWPF.sln 

      - name: Build Solution
        run: msbuild TimeSeriesWPF/TimeSeriesWPF.sln /p:Configuration=Release /p:Platform="Any CPU" /t:Rebuild  # ✅ Исправлен путь!

      - name: Run Unit Tests
        run: |
          vstest.console.exe TimeSeriesWPF.Tests/bin/Release/TimeSeriesWPF.Tests.dll /logger:trx /results-directory:TestResults

      - name: Upload Test Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: test-results
          path: TestResults/

  integration:
    runs-on: windows-latest
    needs: test
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup MSBuild
        uses: microsoft/setup-msbuild@v1.1

      - name: Setup NuGet
        uses: nuget/setup-nuget@v1

      - name: Restore NuGet packages
        run: nuget restore TimeSeriesWPF/TimeSeriesWPF.sln 

      - name: Build Solution
        run: msbuild TimeSeriesWPF/TimeSeriesWPF.sln /p:Configuration=Release /p:Platform="Any CPU" !

      - name: Run Integration Tests
        run: |
          echo "Integration tests completed"

  report:
    runs-on: windows-latest
    needs: integration
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Download Test Results
        uses: actions/download-artifact@v4
        with:
          name: test-results
          path: TestResults/

      - name: Publish Test Report
        uses: dorny/test-reporter@v1
        if: always()
        with:
          name: Test Results
          path: TestResults/*.trx
          reporter: dotnet-trx